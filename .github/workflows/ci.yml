name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Required gate (lint + typecheck + unit tests)
        run: pnpm test:required-gate

  integration-nonblocking:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: climbing_coach_test
        options: >-
          --health-cmd "pg_isready -U postgres -d climbing_coach_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/climbing_coach_test?schema=public
      NEXTAUTH_SECRET: ci-secret-ci-secret
      NEXTAUTH_URL: http://localhost:3000
      OPENAI_API_KEY: test-key
      OPENAI_MODEL_PRIMARY: test-model
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Deploy migrations
        run: pnpm prisma:migrate:deploy

      - name: Integration tests
        run: pnpm test:integration

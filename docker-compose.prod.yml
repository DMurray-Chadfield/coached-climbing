services:
  web:
    # Build/push your image elsewhere, then set WEB_IMAGE on the VM before running:
    #   export WEB_IMAGE="REGION-docker.pkg.dev/PROJECT/REPO/ai-climbing-coach:TAG"
    image: ${WEB_IMAGE:?Set WEB_IMAGE to your published image (see docker-compose.prod.yml)}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    ports:
      - "3000:3000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: climbing_coach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d climbing_coach"]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: caddy:2.8-alpine
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres_data:

services:
  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.local
    ports:
      - "3000:3000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: climbing_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d climbing_coach"]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: caddy:2.8-alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  postgres_data:
